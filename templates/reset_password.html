<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalNeural — Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <style>
        body { background: #050505; }
        .bg-dots { background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 0); background-size: 24px 24px; }
    </style>
</head>
<body class="bg-dots text-gray-200 font-sans antialiased h-screen w-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl">
        <div class="flex items-center gap-3 mb-8 justify-center">
            <div class="w-3 h-3 bg-nothing-red rounded-full"></div>
            <span class="font-mono text-xs tracking-widest text-gray-400 uppercase">Local<span class="text-nothing-red font-bold">Neural</span></span>
        </div>

        {% if expired %}
        <div id="error-msg" class="text-red-500 text-xs font-mono text-center mb-4">This reset link is invalid or has expired.</div>
        <div class="text-center">
            <a href="/login" class="text-xs font-mono text-nothing-red hover:underline">Back to Login</a>
        </div>
        {% else %}
        <div id="reset-error" class="text-red-500 text-xs font-mono text-center mb-4 hidden"></div>
        <div id="reset-success" class="text-green-500 text-xs font-mono text-center mb-4 hidden"></div>

        <div id="reset-form" class="space-y-4">
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">New Password</label>
                <input id="new-password" type="password" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono">
            </div>
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Confirm New Password</label>
                <input id="cnew-password" type="password" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono" onkeydown="if(event.key==='Enter')doReset()">
            </div>
            <button onclick="doReset()" class="w-full bg-nothing-red text-white py-2.5 rounded-full font-bold text-sm hover:bg-red-600 transition shadow-lg mt-2">Reset Password</button>
            <p class="text-xs text-gray-600 font-mono text-center mt-4"><a href="/login" class="text-nothing-red hover:underline">Back to Login</a></p>
        </div>
        {% endif %}
    </div>

    <script>
        {% if not expired %}
        const TOKEN = '{{ token }}';
        function showError(msg) {
            const el = document.getElementById('reset-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function hideError() {
            document.getElementById('reset-error').classList.add('hidden');
        }
        function doReset() {
            hideError();
            const password = document.getElementById('new-password').value;
            const cpassword = document.getElementById('cnew-password').value;
            if (!password || !cpassword) { showError('Fill in all fields'); return; }
            if (password !== cpassword) { showError('Passwords do not match'); return; }
            if (password.length < 4) { showError('Password must be at least 4 characters'); return; }
            fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: TOKEN, password, cpassword })
            })
            .then(r => r.json())
            .then(d => {
                if (d.status === 'success') {
                    document.getElementById('reset-form').classList.add('hidden');
                    document.getElementById('reset-success').textContent = d.message + ' — redirecting...';
                    document.getElementById('reset-success').classList.remove('hidden');
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    showError(d.error || 'Reset failed');
                }
            })
            .catch(() => showError('Connection error'));
        }
        {% endif %}
    </script>
    <style>.bg-nothing-red { background-color: var(--accent, #D71921); } .text-nothing-red { color: var(--accent, #D71921); }</style>
</body>
</html>
