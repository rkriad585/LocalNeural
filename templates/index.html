{% extends "base.html" %}

{% block content %}
<div id="mobile-overlay" class="fixed inset-0 bg-black/80 z-40 hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

{% include "settings.html" %}

<!-- PROJECT MODAL -->
<div id="project-modal" class="fixed inset-0 z-[80] hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleProjectModal()"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-lg p-6 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl">
        <h2 class="font-mono font-bold tracking-wider uppercase mb-4 text-white">New Project</h2>
        <form id="project-form" class="space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Project Name</label>
                <input name="title" required class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2 text-white focus:outline-none focus:border-nothing-red">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Description</label>
                <textarea name="description" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2 text-white focus:outline-none h-20 resize-none"></textarea>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Knowledge Base Files (PDF, Code, MD, TXT)</label>
                <input type="file" name="files" multiple class="w-full text-xs text-gray-400 bg-[#151515] rounded border border-white/10 p-2">
            </div>
            <div class="flex justify-end pt-4">
                <button type="submit" class="bg-nothing-red text-white px-6 py-2 rounded-full font-bold hover:bg-red-600 transition shadow-lg">Create Project</button>
            </div>
        </form>
    </div>
</div>

<!-- PROMPT LIBRARY MODAL (Existing) -->
<div id="library-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleLibrary()"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl p-6 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl h-[80vh] flex flex-col">
        <div class="flex justify-between items-center mb-4 shrink-0">
            <h2 class="font-mono font-bold tracking-wider uppercase">Prompt Library</h2>
            <button onclick="toggleLibrary()" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div class="flex gap-2 mb-4 shrink-0">
            <input id="new-prompt-title" placeholder="Title" class="bg-[#151515] border border-white/10 rounded px-3 py-2 text-sm text-white focus:outline-none w-1/3">
            <input id="new-prompt-content" placeholder="Prompt text..." class="bg-[#151515] border border-white/10 rounded px-3 py-2 text-sm text-white focus:outline-none flex-1">
            <button onclick="savePrompt()" class="bg-nothing-red text-white px-4 rounded text-sm font-bold hover:bg-red-600">+</button>
        </div>
        <div id="library-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
    </div>
</div>

<div class="flex h-full w-full relative">
    
    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#0a0a0a] border-r border-white/5 transform -translate-x-full md:translate-x-0 md:relative sidebar-transition flex flex-col">
        <div class="p-4 border-b border-white/5 space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2"><div class="w-2 h-2 bg-nothing-red rounded-full"></div><span class="font-mono text-xs tracking-widest text-gray-400 uppercase">Memory</span></div>
                <div class="flex gap-1">
                    <button onclick="toggleSessionSettings()" class="p-1.5 hover:bg-white/10 rounded transition text-gray-400 hover:text-white" title="Current Chat Settings">⚙</button>
                    <button onclick="newChat()" class="p-1.5 hover:bg-white/10 rounded transition text-gray-400 hover:text-white" title="New Chat">+</button>
                </div>
            </div>
            
            <!-- PROJECTS DROPDOWN -->
            <div class="relative group">
                <button onclick="toggleProjectModal()" class="w-full flex items-center justify-center gap-2 bg-[#151515] text-xs text-white p-2 rounded border border-white/10 hover:border-nothing-red/50 transition">
                    <span>+ New Project</span>
                </button>
            </div>
            <div id="projects-list" class="flex flex-wrap gap-2 max-h-24 overflow-y-auto">
                <!-- Projects injected here -->
            </div>

            <input type="text" id="history-search" placeholder="Search..." class="w-full bg-[#151515] text-xs text-white p-2 rounded border border-white/10 focus:border-nothing-red focus:outline-none">
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        <div class="p-4 border-t border-white/5 bg-[#080808] flex gap-2">
            <button onclick="toggleSettings()" class="flex-1 p-2 rounded hover:bg-white/5 text-gray-400 hover:text-white text-xs font-mono uppercase border border-white/5">Global Config</button>
            <button onclick="toggleLibrary()" class="flex-1 p-2 rounded hover:bg-white/5 text-gray-400 hover:text-white text-xs font-mono uppercase border border-white/5">Library</button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col h-full relative w-full min-w-0">
        <header class="glass h-14 shrink-0 flex items-center justify-between px-4 sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg></button>
                <div class="flex flex-col">
                    <h1 class="font-mono font-bold text-sm md:text-base tracking-wider uppercase flex items-center gap-2">Local<span class="text-nothing-red">Neural</span></h1>
                    <span id="active-project-name" class="text-[10px] text-gray-500 font-mono hidden"></span>
                </div>
            </div>
            <div class="w-32 md:w-48">
                <select id="model-select" class="w-full bg-[#111] border border-white/10 text-white text-xs rounded-full px-3 py-1.5 focus:outline-none focus:border-nothing-red font-mono appearance-none truncate"><option disabled selected>Loading...</option></select>
            </div>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-smooth pb-4" onscroll="checkScroll()">
            <div id="welcome-msg" class="h-full flex flex-col items-center justify-center text-center opacity-40 select-none">
                <div class="w-20 h-20 rounded-full border border-dashed border-white/20 flex items-center justify-center mb-4 animate-pulse"><svg class="w-8 h-8 text-nothing-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>
                <h2 class="text-lg font-mono">SYSTEM ONLINE</h2>
            </div>
        </main>
        
        <button id="autoscroll-btn" onclick="toggleAutoScroll()" class="absolute bottom-24 right-6 z-30 p-2 bg-[#1a1a1a] border border-white/10 rounded-full shadow-xl text-nothing-red hidden"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg></button>

        <div class="shrink-0 p-3 md:p-5 bg-gradient-to-t from-[#050505] via-[#050505] to-transparent z-20">
            <form id="chat-form" class="relative max-w-4xl mx-auto flex items-end gap-2 bg-[#121212] border border-white/10 rounded-2xl p-1.5 shadow-xl transition-shadow focus-within:border-white/20">
                <div id="img-preview" class="hidden absolute bottom-14 left-0 p-2 bg-[#111] border border-white/10 rounded-lg shadow-xl">
                    <div class="relative"><img id="preview-src" src="" class="h-20 w-auto rounded border border-white/20"><button type="button" onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button></div>
                </div>

                <label class="p-2.5 text-gray-400 hover:text-white cursor-pointer transition mb-0.5" title="Upload Image">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <input type="file" id="img-upload" class="hidden" accept="image/*" onchange="handleImageSelect(this)">
                </label>

                <textarea id="user-input" rows="1" placeholder="Enter prompt..." class="w-full bg-transparent text-white px-2 py-3 max-h-32 focus:outline-none resize-none overflow-y-auto text-sm md:text-base font-mono leading-relaxed" oninput="this.style.height='';this.style.height=Math.min(this.scrollHeight,128)+'px'"></textarea>
                
                <button type="submit" id="action-btn" class="p-2.5 bg-white text-black rounded-xl hover:bg-gray-200 transition-colors mb-0.5 shrink-0">
                    <svg id="icon-send" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                    <svg id="icon-stop" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/chat_extras.js') }}"></script>
{% endblock %}
