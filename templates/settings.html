<div id="settings-modal" class="fixed inset-0 z-[60] hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleSettings()"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-lg bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl animate-fade-in-up max-h-[90vh] flex flex-col">
        
        <div class="flex justify-between items-center mb-6 px-6 pt-6 shrink-0">
            <h2 class="text-lg font-mono font-bold tracking-wider uppercase">System Config</h2>
            <button onclick="toggleSettings()" class="text-gray-500 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>

        <div class="space-y-6 px-6 pb-6 overflow-y-auto">
            <!-- System Prompt -->
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-2 uppercase">System Prompt</label>
                <textarea id="setting-system" rows="3" class="w-full bg-[#151515] border border-white/10 rounded-lg p-3 text-sm text-gray-200 focus:border-nothing-red focus:outline-none resize-none"></textarea>
                <div class="mt-2">
                    <label class="text-[10px] font-mono text-gray-600 uppercase">Load Template</label>
                    <select id="template-select" onchange="applyTemplate()" class="w-full bg-[#151515] border border-white/10 rounded px-2 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-nothing-red font-mono mt-1">
                        <option value="">Select a template...</option>
                    </select>
                </div>
            </div>

            <!-- Temperature -->
            <div>
                <div class="flex justify-between mb-2">
                    <label class="block text-xs font-mono text-gray-500 uppercase">Temperature</label>
                    <span id="temp-display" class="text-xs font-mono text-nothing-red">0.7</span>
                </div>
                <input type="range" id="setting-temp" min="0" max="1" step="0.1" value="0.7" class="w-full" oninput="document.getElementById('temp-display').innerText = this.value">
            </div>

            <!-- Custom Theme -->
            <div class="pt-4 border-t border-white/10">
                <label class="block text-xs font-mono text-gray-500 mb-3 uppercase">Custom Theme</label>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-mono text-gray-600 uppercase block mb-1">Accent Color</label>
                        <div class="flex gap-2 items-center">
                            <input type="color" id="accent-picker" value="#D71921" onchange="applyAccentColor(this.value)" class="w-10 h-10 rounded cursor-pointer border border-white/10 bg-transparent p-0.5">
                            <span id="accent-color-display" class="text-xs text-gray-500 font-mono">#D71921</span>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-mono text-gray-600 uppercase block mb-1">Font Size</label>
                        <div class="flex gap-2 items-center">
                            <input type="range" id="font-size-slider" min="11" max="18" step="1" value="14" oninput="applyFontSize(this.value)" class="flex-1">
                            <span id="font-size-display" class="text-xs text-gray-500 font-mono w-8">14px</span>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-3">
                    <button onclick="exportTheme()" class="px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10">Export Theme</button>
                    <button onclick="importTheme()" class="px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10">Import Theme</button>
                </div>
            </div>

            <!-- Export Data -->
            <div class="pt-4 border-t border-white/10">
                <label class="block text-xs font-mono text-gray-500 mb-3 uppercase">Export Current Chat</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="exportChat('md')" class="px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10">Markdown</button>
                    <button onclick="exportChat('json')" class="px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10">JSON</button>
                    <button onclick="exportChat('html')" class="px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10">HTML / PDF</button>
                </div>
            </div>

            <!-- Database -->
            <div class="pt-4 border-t border-white/10">
                <label class="block text-xs font-mono text-gray-500 mb-3 uppercase">Database</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportDB()" class="px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10">Backup DB</button>
                    <button onclick="importDB()" class="px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10">Restore DB</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="pt-4 border-t border-white/10">
                <label class="block text-xs font-mono text-gray-500 mb-3 uppercase">Usage Statistics</label>
                <button onclick="loadStats()" class="w-full px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10 text-left">Load Stats</button>
                <div id="stats-display" class="text-[10px] font-mono text-gray-600 mt-2 hidden space-y-1"></div>
            </div>

            <!-- AI Providers -->
            <div class="pt-4 border-t border-white/10">
                <label class="block text-xs font-mono text-gray-500 mb-3 uppercase">AI Providers</label>
                <div class="space-y-3">
                    <div>
                        <label class="text-[10px] font-mono text-gray-600 uppercase block mb-1">Active Provider</label>
                        <select id="setting-provider" onchange="onProviderChange()" class="w-full bg-[#151515] border border-white/10 rounded px-2 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-nothing-red font-mono">
                            <option value="ollama">Ollama (Local)</option>
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="gemini">Google Gemini</option>
                            <option value="openrouter">OpenRouter</option>
                            <option value="groq">Groq</option>
                        </select>
                    </div>
                    <div id="provider-api-key-group">
                        <label class="text-[10px] font-mono text-gray-600 uppercase block mb-1">API Key</label>
                        <input id="setting-api-key" type="password" placeholder="sk-..." class="w-full bg-[#151515] border border-white/10 rounded px-2 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-nothing-red font-mono">
                    </div>
                    <div>
                        <label class="text-[10px] font-mono text-gray-600 uppercase block mb-1">Ollama Base URL</label>
                        <input id="setting-ollama-url" type="text" value="http://localhost:11434" class="w-full bg-[#151515] border border-white/10 rounded px-2 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-nothing-red font-mono">
                    </div>
                </div>
            </div>

            <!-- Health -->
            <div class="pt-4 border-t border-white/10">
                <label class="block text-xs font-mono text-gray-500 mb-3 uppercase">System Health</label>
                <button onclick="healthCheck()" class="w-full px-3 py-2 bg-white/5 hover:bg-white/10 rounded text-xs border border-white/10 text-left">Check Status</button>
                <div id="health-display" class="text-[10px] font-mono text-gray-600 mt-2 hidden"></div>
            </div>
        </div>

        <div class="mt-8 flex justify-end gap-3">
            <button onclick="saveSettings()" class="px-6 py-2 bg-nothing-red text-white text-sm font-bold rounded-full hover:bg-red-600 transition shadow-lg">Save</button>
        </div>
    </div>
</div>
