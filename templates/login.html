<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalNeural — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <style>
        body { background: #050505; }
        .bg-dots { background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 0); background-size: 24px 24px; }
    </style>
</head>
<body class="bg-dots text-gray-200 font-sans antialiased h-screen w-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl">
        <div class="flex items-center gap-3 mb-8 justify-center">
            <div class="w-3 h-3 bg-nothing-red rounded-full"></div>
            <span class="font-mono text-xs tracking-widest text-gray-400 uppercase">Local<span class="text-nothing-red font-bold">Neural</span></span>
        </div>
        <div id="auth-error" class="text-red-500 text-xs font-mono text-center mb-4 hidden"></div>

        <!-- LOGIN -->
        <div id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Username or Email</label>
                <input id="login-username" type="text" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono">
            </div>
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Password</label>
                <input id="login-password" type="password" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <button onclick="doLogin()" class="w-full bg-nothing-red text-white py-2.5 rounded-full font-bold text-sm hover:bg-red-600 transition shadow-lg mt-2">Login</button>
            <div class="flex justify-between text-xs text-gray-600 font-mono mt-3">
                <button onclick="showForgotPassword()" class="text-nothing-red hover:underline">Forgot Password?</button>
                <button onclick="showRegister()" class="text-nothing-red hover:underline font-bold">Register</button>
            </div>
        </div>

        <!-- REGISTER -->
        <div id="register-form" class="space-y-3 hidden">
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Full Name</label>
                <input id="reg-fullname" type="text" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono">
            </div>
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Email</label>
                <input id="reg-email" type="email" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono">
            </div>
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Username <span class="text-nothing-red">*</span></label>
                <input id="reg-username" type="text" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono">
            </div>
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Password <span class="text-nothing-red">*</span></label>
                <input id="reg-password" type="password" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono">
            </div>
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Confirm Password <span class="text-nothing-red">*</span></label>
                <input id="reg-cpassword" type="password" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono" onkeydown="if(event.key==='Enter')doRegister()">
            </div>
            <button onclick="doRegister()" class="w-full bg-nothing-red text-white py-2.5 rounded-full font-bold text-sm hover:bg-red-600 transition shadow-lg mt-1">Create Account</button>
            <p class="text-xs text-gray-600 font-mono text-center mt-2">Already have an account? <button onclick="showLogin()" class="text-nothing-red hover:underline font-bold">Login</button></p>
        </div>

        <!-- FORGOT PASSWORD -->
        <div id="forgot-form" class="space-y-4 hidden">
            <p class="text-xs text-gray-500 font-mono text-center">Enter your email and we'll send you a reset link.</p>
            <div>
                <label class="block text-xs font-mono text-gray-500 mb-1">Email</label>
                <input id="forgot-email" type="email" class="w-full bg-[#151515] border border-white/10 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-nothing-red font-mono" onkeydown="if(event.key==='Enter')doForgotPassword()">
            </div>
            <button onclick="doForgotPassword()" class="w-full bg-nothing-red text-white py-2.5 rounded-full font-bold text-sm hover:bg-red-600 transition shadow-lg mt-1">Send Reset Link</button>
            <div id="forgot-msg" class="text-xs font-mono text-center mt-2 hidden"></div>
            <p class="text-xs text-gray-600 font-mono text-center mt-2"><button onclick="showLogin()" class="text-nothing-red hover:underline font-bold">Back to Login</button></p>
        </div>
    </div>
    <script>
        function showError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.classList.remove('hidden'); }
        function hideError() { document.getElementById('auth-error').classList.add('hidden'); }
        function showRegister() {
            hideError();
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
        }
        function showLogin() {
            hideError();
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }
        function showForgotPassword() {
            hideError();
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.remove('hidden');
            document.getElementById('forgot-msg').classList.add('hidden');
        }
        function doForgotPassword() {
            hideError();
            const email = document.getElementById('forgot-email').value.trim();
            if (!email || email.indexOf('@') === -1) { showError('Enter a valid email address'); return; }
            const btn = document.querySelector('#forgot-form button');
            btn.disabled = true; btn.textContent = 'Sending...';
            fetch('/api/auth/forgot-password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) })
            .then(r => r.json()).then(d => {
                btn.disabled = false; btn.textContent = 'Send Reset Link';
                const msg = document.getElementById('forgot-msg');
                if (d.status === 'success') {
                    msg.className = 'text-xs font-mono text-center mt-2 text-green-500';
                    msg.textContent = d.message || 'Reset link sent! Check your email.';
                } else {
                    msg.className = 'text-xs font-mono text-center mt-2 text-red-500';
                    msg.textContent = d.error || 'Failed to send reset link';
                }
                msg.classList.remove('hidden');
            })
            .catch(() => { btn.disabled = false; btn.textContent = 'Send Reset Link'; showError('Connection error'); });
        }
        function doLogin() {
            hideError();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!username || !password) { showError('Fill in all fields'); return; }
            fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) })
            .then(r => r.json()).then(d => { if (d.status === 'success') window.location.href = '/'; else showError(d.error || 'Login failed'); })
            .catch(() => showError('Connection error'));
        }
        function doRegister() {
            hideError();
            const full_name = document.getElementById('reg-fullname').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const cpassword = document.getElementById('reg-cpassword').value;
            if (!username || !password || !cpassword) { showError('Username, password and confirm password are required'); return; }
            if (password !== cpassword) { showError('Passwords do not match'); return; }
            if (password.length < 4) { showError('Password must be at least 4 characters'); return; }
            if (email && email.indexOf('@') === -1) { showError('Invalid email address'); return; }
            fetch('/api/auth/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password, cpassword, email, full_name}) })
            .then(r => r.json()).then(d => { if (d.status === 'success') window.location.href = '/'; else showError(d.error || 'Registration failed'); })
            .catch(() => showError('Connection error'));
        }
    </script>
    <style>.bg-nothing-red { background-color: var(--accent, #D71921); } .text-nothing-red { color: var(--accent, #D71921); }</style>
</body>
</html>
