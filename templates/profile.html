<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalNeural — Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; }
        .bg-dots { background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 0); background-size: 24px 24px; }
    </style>
</head>
<body class="bg-dots text-gray-200 font-sans antialiased h-[100dvh] w-screen overflow-hidden flex flex-col">
    <div class="w-full max-w-4xl mx-auto px-3 md:px-6 py-4 md:py-6 flex-1 overflow-y-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-5 md:mb-8">
            <div class="flex items-center gap-2 md:gap-3">
                <div class="w-2.5 h-2.5 md:w-3 md:h-3 bg-nothing-red rounded-full shrink-0"></div>
                <span class="font-mono text-[10px] md:text-xs tracking-widest text-gray-400 uppercase">Local<span class="text-nothing-red font-bold">Neural</span></span>
                <span class="text-[9px] md:text-[10px] text-gray-600 font-mono">/ Profile</span>
            </div>
            <div class="flex items-center gap-2">
                <a href="/" class="text-[10px] md:text-xs font-mono text-gray-500 hover:text-white transition flex items-center gap-1">
                    <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back
                </a>
                <a href="/settings" class="text-[10px] md:text-xs font-mono text-gray-500 hover:text-white transition flex items-center gap-1 px-2 py-1 rounded hover:bg-white/5 border border-white/5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Settings
                </a>
            </div>
        </div>

        <div id="profile-error" class="text-red-500 text-[10px] md:text-xs font-mono text-center mb-3 md:mb-4 hidden"></div>
        <div id="profile-success" class="text-green-500 text-[10px] md:text-xs font-mono text-center mb-3 md:mb-4 hidden"></div>

        <!-- Avatar + Info Row -->
        <div class="flex flex-col md:flex-row items-center md:items-start gap-4 md:gap-6 mb-6 md:mb-8">
            <div class="flex flex-col items-center md:items-center shrink-0">
                <div class="relative group">
                    <div id="avatar-container" class="w-20 h-20 md:w-24 md:h-24 rounded-full border-2 border-white/10 overflow-hidden flex items-center justify-center bg-[#151515] text-2xl md:text-3xl font-mono font-bold text-gray-600 cursor-pointer transition group-hover:border-nothing-red/50" onclick="document.getElementById('pic-upload').click()">
                        <img id="profile-pic-img" class="w-full h-full object-cover hidden" src="" alt="avatar">
                        <span id="avatar-initials">?</span>
                    </div>
                    <button onclick="document.getElementById('pic-upload').click()" class="absolute bottom-0 right-0 bg-nothing-red text-white rounded-full w-6 h-6 md:w-7 md:h-7 flex items-center justify-center hover:bg-red-600 transition shadow-lg">
                        <svg class="w-3 h-3 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </button>
                </div>
                <input type="file" id="pic-upload" class="hidden" accept="image/png,image/jpeg,image/gif,image/webp" onchange="uploadProfilePic(this)">
                <p class="text-[9px] md:text-xs text-gray-600 font-mono mt-1.5 md:mt-2 text-center">Tap to change photo</p>
            </div>
            <div class="flex-1 w-full md:w-auto">
                <div class="bg-[#0a0a0a] border border-white/10 rounded-xl md:rounded-2xl p-4 md:p-5 shadow-2xl space-y-3 md:space-y-4">
                    <h2 class="font-mono font-bold tracking-wider uppercase text-white text-[11px] md:text-sm">Profile Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                        <div>
                            <label class="block text-[9px] md:text-xs font-mono text-gray-500 mb-0.5 md:mb-1">Full Name</label>
                            <input id="pf-fullname" type="text" class="w-full bg-[#151515] border border-white/10 rounded-lg px-2.5 py-2 md:px-3 md:py-2.5 text-white text-[11px] md:text-sm focus:outline-none focus:border-nothing-red font-mono">
                        </div>
                        <div>
                            <label class="block text-[9px] md:text-xs font-mono text-gray-500 mb-0.5 md:mb-1">Email</label>
                            <input id="pf-email" type="email" class="w-full bg-[#151515] border border-white/10 rounded-lg px-2.5 py-2 md:px-3 md:py-2.5 text-white text-[11px] md:text-sm focus:outline-none focus:border-nothing-red font-mono">
                        </div>
                        <div>
                            <label class="block text-[9px] md:text-xs font-mono text-gray-500 mb-0.5 md:mb-1">Username</label>
                            <input id="pf-username" type="text" class="w-full bg-[#151515] border border-white/10 rounded-lg px-2.5 py-2 md:px-3 md:py-2.5 text-white text-[11px] md:text-sm focus:outline-none focus:border-nothing-red font-mono">
                        </div>
                        <div class="flex items-end pb-2 md:pb-2.5">
                            <div class="text-[9px] md:text-[10px] text-gray-600 font-mono">Joined: <span id="pf-joined"></span></div>
                        </div>
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-nothing-red text-white py-2 md:py-2.5 rounded-lg md:rounded-full font-bold text-[11px] md:text-sm hover:bg-red-600 transition shadow-lg">Save Changes</button>
                </div>
            </div>
        </div>

        <!-- Change Password -->
        <div class="bg-[#0a0a0a] border border-white/10 rounded-xl md:rounded-2xl p-4 md:p-5 shadow-2xl space-y-3 md:space-y-4 mb-4 md:mb-6">
            <h2 class="font-mono font-bold tracking-wider uppercase text-white text-[11px] md:text-sm">Change Password</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4">
                <div>
                    <label class="block text-[9px] md:text-xs font-mono text-gray-500 mb-0.5 md:mb-1">Current Password</label>
                    <input id="pf-curpass" type="password" class="w-full bg-[#151515] border border-white/10 rounded-lg px-2.5 py-2 md:px-3 md:py-2.5 text-white text-[11px] md:text-sm focus:outline-none focus:border-nothing-red font-mono">
                </div>
                <div>
                    <label class="block text-[9px] md:text-xs font-mono text-gray-500 mb-0.5 md:mb-1">New Password</label>
                    <input id="pf-newpass" type="password" class="w-full bg-[#151515] border border-white/10 rounded-lg px-2.5 py-2 md:px-3 md:py-2.5 text-white text-[11px] md:text-sm focus:outline-none focus:border-nothing-red font-mono">
                </div>
                <div>
                    <label class="block text-[9px] md:text-xs font-mono text-gray-500 mb-0.5 md:mb-1">Confirm New Password</label>
                    <input id="pf-cnewpass" type="password" class="w-full bg-[#151515] border border-white/10 rounded-lg px-2.5 py-2 md:px-3 md:py-2.5 text-white text-[11px] md:text-sm focus:outline-none focus:border-nothing-red font-mono" onkeydown="if(event.key==='Enter')changePassword()">
                </div>
            </div>
            <button onclick="changePassword()" class="w-full border border-white/10 text-white py-2 md:py-2.5 rounded-lg md:rounded-full font-bold text-[11px] md:text-sm hover:bg-white/5 transition">Update Password</button>
        </div>

        <!-- Conversations + Archive 2-col grid on desktop -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 mb-4 md:mb-6">
            <!-- All Conversations -->
            <div class="bg-[#0a0a0a] border border-white/10 rounded-xl md:rounded-2xl shadow-2xl flex flex-col min-h-0">
                <div class="flex items-center justify-between p-3 md:p-4 border-b border-white/5">
                    <h2 class="font-mono font-bold tracking-wider uppercase text-white text-[10px] md:text-xs">Conversations</h2>
                    <span id="conv-count" class="text-[9px] md:text-[10px] text-gray-600 font-mono"></span>
                </div>
                <div id="conv-list" class="flex-1 overflow-y-auto p-2 md:p-3 space-y-1 max-h-72 md:max-h-96"></div>
            </div>

            <!-- Archived -->
            <div class="bg-[#0a0a0a] border border-white/10 rounded-xl md:rounded-2xl shadow-2xl flex flex-col min-h-0">
                <div class="flex items-center justify-between p-3 md:p-4 border-b border-white/5">
                    <h2 class="font-mono font-bold tracking-wider uppercase text-white text-[10px] md:text-xs">Archived</h2>
                    <span id="arch-count" class="text-[9px] md:text-[10px] text-gray-600 font-mono"></span>
                </div>
                <div id="arch-list" class="flex-1 overflow-y-auto p-2 md:p-3 space-y-1 max-h-72 md:max-h-96"></div>
            </div>
        </div>

        <!-- Configuration -->
        <div class="bg-[#0a0a0a] border border-white/10 rounded-xl md:rounded-2xl p-4 md:p-5 shadow-2xl space-y-3 md:space-y-4 mb-4 md:mb-6">
            <h2 class="font-mono font-bold tracking-wider uppercase text-white text-[11px] md:text-sm">Configuration</h2>
            <div id="config-content"></div>
        </div>
    </div>

    <script>
        const ICONS = {
            check: '<svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
            xmark: '<svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>'
        };

        function showError(msg) {
            const el = document.getElementById('profile-error');
            el.innerHTML = ICONS.xmark + ' ' + msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }
        function showSuccess(msg) {
            const el = document.getElementById('profile-success');
            el.innerHTML = ICONS.check + ' ' + msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }
        function hideMessages() {
            document.getElementById('profile-error').classList.add('hidden');
            document.getElementById('profile-success').classList.add('hidden');
        }

        function getInitials(name, username) {
            if (name && name.trim()) {
                const parts = name.trim().split(/\s+/);
                return parts.length > 1 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : parts[0][0].toUpperCase();
            }
            return username ? username[0].toUpperCase() : '?';
        }

        function loadProfile() {
            fetch('/api/profile')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('pf-fullname').value = data.full_name || '';
                    document.getElementById('pf-email').value = data.email || '';
                    document.getElementById('pf-username').value = data.username || '';
                    document.getElementById('pf-joined').textContent = data.created_at ? new Date(data.created_at).toLocaleDateString() : 'Unknown';
                    const initialsEl = document.getElementById('avatar-initials');
                    const imgEl = document.getElementById('profile-pic-img');
                    if (data.profile_pic) {
                        imgEl.src = data.profile_pic;
                        imgEl.classList.remove('hidden');
                        initialsEl.classList.add('hidden');
                    } else {
                        imgEl.classList.add('hidden');
                        initialsEl.classList.remove('hidden');
                        initialsEl.textContent = getInitials(data.full_name, data.username);
                    }
                })
                .catch(() => { window.location.href = '/login'; });
        }

        function saveProfile() {
            hideMessages();
            const full_name = document.getElementById('pf-fullname').value.trim();
            const email = document.getElementById('pf-email').value.trim();
            const username = document.getElementById('pf-username').value.trim();
            if (!username) { showError('Username is required'); return; }
            if (email && email.indexOf('@') === -1) { showError('Invalid email address'); return; }
            fetch('/api/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, full_name })
            })
            .then(r => r.json())
            .then(d => {
                if (d.status === 'success') {
                    showSuccess('Profile updated successfully');
                    loadProfile();
                } else {
                    showError(d.error || 'Failed to update profile');
                }
            })
            .catch(() => showError('Connection error'));
        }

        function uploadProfilePic(input) {
            if (!input.files || !input.files[0]) return;
            hideMessages();
            const formData = new FormData();
            formData.append('pic', input.files[0]);
            fetch('/api/profile/pic', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(d => {
                if (d.status === 'success') {
                    showSuccess('Profile picture updated');
                    loadProfile();
                } else {
                    showError(d.error || 'Failed to upload picture');
                }
            })
            .catch(() => showError('Connection error'));
            input.value = '';
        }

        function changePassword() {
            hideMessages();
            const current = document.getElementById('pf-curpass').value;
            const newpass = document.getElementById('pf-newpass').value;
            const cnewpass = document.getElementById('pf-cnewpass').value;
            if (!current || !newpass || !cnewpass) { showError('Fill in all password fields'); return; }
            if (newpass !== cnewpass) { showError('New passwords do not match'); return; }
            if (newpass.length < 4) { showError('New password must be at least 4 characters'); return; }
            fetch('/api/profile/password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password: current, new_password: newpass, confirm_new_password: cnewpass })
            })
            .then(r => r.json())
            .then(d => {
                if (d.status === 'success') {
                    showSuccess('Password changed successfully');
                    document.getElementById('pf-curpass').value = '';
                    document.getElementById('pf-newpass').value = '';
                    document.getElementById('pf-cnewpass').value = '';
                } else {
                    showError(d.error || 'Failed to change password');
                }
            })
            .catch(() => showError('Connection error'));
        }

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function timeAgo(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const s = Math.floor((Date.now() - d) / 1000);
            if (s < 60) return 'just now';
            const m = Math.floor(s / 60);
            if (m < 60) return m + 'm ago';
            const h = Math.floor(m / 60);
            if (h < 24) return h + 'h ago';
            return d.toLocaleDateString();
        }

        function sessionItem(s, archived) {
            return '<a href="/?session=' + s.id + '" class="flex items-center justify-between p-2 md:p-2.5 rounded-lg transition group ' + (archived ? 'opacity-60 hover:opacity-100' : 'hover:bg-white/5') + '">' +
                '<div class="flex-1 min-w-0">' +
                    '<div class="text-[11px] md:text-xs ' + (archived ? 'text-gray-500' : 'text-white') + ' font-mono truncate">' + escapeHtml(s.title || 'Untitled') + '</div>' +
                    '<div class="text-[9px] md:text-[10px] text-gray-600 font-mono mt-0.5">' +
                        (s.model ? escapeHtml(s.model) : '') +
                        (s.model && s.timestamp ? ' \u00b7 ' : '') +
                        timeAgo(s.timestamp) +
                    '</div>' +
                '</div>' +
                '<svg class="w-3 h-3 md:w-3.5 md:h-3.5 text-gray-700 group-hover:text-gray-500 shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>' +
            '</a>';
        }

        function loadConversations() {
            fetch('/api/history')
                .then(r => r.json())
                .then(sessions => {
                    document.getElementById('conv-count').textContent = sessions.length + ' total';
                    const el = document.getElementById('conv-list');
                    el.innerHTML = sessions.map(s => sessionItem(s, false)).join('');
                });
        }

        function loadArchived() {
            fetch('/api/history?archived=1')
                .then(r => r.json())
                .then(sessions => {
                    const archived = sessions.filter(s => s.archived);
                    document.getElementById('arch-count').textContent = archived.length + ' archived';
                    const el = document.getElementById('arch-list');
                    if (archived.length === 0) {
                        el.innerHTML = '<div class="text-[10px] md:text-[11px] text-gray-600 font-mono text-center py-6 md:py-8">No archived conversations</div>';
                        return;
                    }
                    el.innerHTML = archived.map(s => sessionItem(s, true)).join('');
                });
        }

        function loadConfig() {
            Promise.all([
                fetch('/api/config').then(r => r.json()),
                fetch('/api/stats').then(r => r.json()),
                fetch('/api/profile').then(r => r.json())
            ]).then(([config, stats, profile]) => {
                const el = document.getElementById('config-content');
                let html = '<div class="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-3">';

                html += '<div class="bg-[#151515] rounded-lg md:rounded-xl p-2.5 md:p-3 border border-white/5">' +
                    '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono">System Prompt</div>' +
                    '<div class="text-[10px] md:text-xs text-gray-300 font-mono mt-0.5 md:mt-1 truncate" title="' + escapeHtml(config.system_prompt) + '">' + escapeHtml(config.system_prompt.slice(0, 50)) + (config.system_prompt.length > 50 ? '...' : '') + '</div>' +
                '</div>';

                html += '<div class="bg-[#151515] rounded-lg md:rounded-xl p-2.5 md:p-3 border border-white/5">' +
                    '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono">Account</div>' +
                    '<div class="text-[10px] md:text-xs text-gray-300 font-mono mt-0.5 md:mt-1 truncate">' + escapeHtml(profile.username || '') + '</div>' +
                    '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono truncate">' + escapeHtml(profile.email || 'no email') + '</div>' +
                '</div>';

                html += '<div class="bg-[#151515] rounded-lg md:rounded-xl p-2.5 md:p-3 border border-white/5">' +
                    '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono">Sessions</div>' +
                    '<div class="text-[10px] md:text-xs text-gray-300 font-mono mt-0.5 md:mt-1">' + (stats.total_sessions || 0) + ' total</div>' +
                    '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono">' + (stats.active_sessions || 0) + ' active \u00b7 ' + (stats.archived_sessions || 0) + ' archived</div>' +
                '</div>';

                html += '<div class="bg-[#151515] rounded-lg md:rounded-xl p-2.5 md:p-3 border border-white/5">' +
                    '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono">Messages</div>' +
                    '<div class="text-[10px] md:text-xs text-gray-300 font-mono mt-0.5 md:mt-1">' + (stats.total_messages || 0) + ' total</div>' +
                    '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono">~' + Math.round((stats.total_est_tokens || 0) / 1000) + 'k tokens</div>' +
                '</div>';

                html += '</div>';

                if (stats.model_counts && stats.model_counts.length) {
                    html += '<div class="bg-[#151515] rounded-lg md:rounded-xl p-2.5 md:p-3 border border-white/5">' +
                        '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono mb-1.5 md:mb-2">Models Used</div>';
                    stats.model_counts.forEach(function(m) {
                        html += '<div class="flex items-center justify-between py-0.5">' +
                            '<span class="text-[10px] md:text-xs text-gray-300 font-mono">' + escapeHtml(m.model) + '</span>' +
                            '<span class="text-[8px] md:text-[10px] text-gray-600 font-mono">' + m.c + ' sessions</span>' +
                        '</div>';
                    });
                    html += '</div>';
                }

                if (stats.sessions_per_day && stats.sessions_per_day.length) {
                    html += '<div class="bg-[#151515] rounded-lg md:rounded-xl p-2.5 md:p-3 border border-white/5">' +
                        '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono mb-1.5 md:mb-2">Recent Activity</div>';
                    stats.sessions_per_day.slice(0, 8).forEach(function(d) {
                        html += '<div class="flex items-center justify-between py-0.5">' +
                            '<span class="text-[10px] md:text-xs text-gray-400 font-mono">' + d.day + '</span>' +
                            '<span class="text-[8px] md:text-[10px] text-gray-600 font-mono">' + d.c + ' sessions</span>' +
                        '</div>';
                    });
                    html += '</div>';
                }

                if (config.templates && Object.keys(config.templates).length) {
                    var names = Object.keys(config.templates);
                    html += '<div class="bg-[#151515] rounded-lg md:rounded-xl p-2.5 md:p-3 border border-white/5">' +
                        '<div class="text-[8px] md:text-[10px] text-gray-600 font-mono mb-1.5 md:mb-2">Prompt Templates (' + names.length + ')</div>' +
                        '<div class="flex flex-wrap gap-1">';
                    names.forEach(function(name) {
                        html += '<span class="text-[8px] md:text-[10px] text-gray-500 font-mono bg-[#0a0a0a] px-1.5 md:px-2 py-0.5 rounded border border-white/5">' + escapeHtml(name) + '</span>';
                    });
                    html += '</div></div>';
                }

                el.innerHTML = html;
            });
        }

        loadProfile();
        loadConversations();
        loadArchived();
        loadConfig();
    </script>
    <style>.bg-nothing-red { background-color: var(--accent, #D71921); } .text-nothing-red { color: var(--accent, #D71921); }</style>
</body>
</html>
